worker_processes 1;

events {
    worker_connections 256;
}

http {
    access_log /dev/stdout;
    error_log  /dev/stderr debug;

    upstream nas       { server dwc:9000; }
    upstream dls1      { server dwc:9003; }
    upstream storage   { server dwc:8000; }
    upstream gamestats { server dwc:9002; }

    # conntest - plain HTTP only
    server {
        listen 80;
        server_name conntest.nintendowifi.net;
        location / {
            return 200 "ok";
        }
    }

    # nas / naswii
    server {
        listen 80;
        listen 443 ssl;
        server_name nas.nintendowifi.net naswii.nintendowifi.net;

        ssl_certificate     /etc/nginx/cert.pem;
        ssl_certificate_key /etc/nginx/key.pem;
        ssl_protocols       SSLv3 TLSv1;
        ssl_ciphers         RC4-SHA:RC4-MD5:DES-CBC3-SHA;

        location / {
            proxy_pass http://nas;
            proxy_set_header Host $host;
        }
    }

    # dls1
    server {
        listen 80;
        listen 443 ssl;
        server_name dls1.nintendowifi.net;

        ssl_certificate     /etc/nginx/cert.pem;
        ssl_certificate_key /etc/nginx/key.pem;
        ssl_protocols       SSLv3 TLSv1;
        ssl_ciphers         RC4-SHA:RC4-MD5:DES-CBC3-SHA;

        location / {
            proxy_pass http://dls1;
            proxy_set_header Host $host;
        }
    }

    # sake (storage)
    server {
        listen 80;
        listen 443 ssl;
        server_name sake.gs.nintendowifi.net;

        ssl_certificate     /etc/nginx/cert.pem;
        ssl_certificate_key /etc/nginx/key.pem;
        ssl_protocols       SSLv3 TLSv1;
        ssl_ciphers         RC4-SHA:RC4-MD5:DES-CBC3-SHA;

        location / {
            proxy_pass http://storage;
            proxy_set_header Host $host;
        }
    }

    # gamestats
    server {
        listen 80;
        listen 443 ssl;
        server_name gamestats.gs.nintendowifi.net gamestats2.gs.nintendowifi.net;

        ssl_certificate     /etc/nginx/cert.pem;
        ssl_certificate_key /etc/nginx/key.pem;
        ssl_protocols       SSLv3 TLSv1;
        ssl_ciphers         RC4-SHA:RC4-MD5:DES-CBC3-SHA;

        location / {
            proxy_pass http://gamestats;
            proxy_set_header Host $host;
        }
    }

    # fallback -> nas
    server {
        listen 80 default_server;
        listen 443 ssl default_server;

        ssl_certificate     /etc/nginx/cert.pem;
        ssl_certificate_key /etc/nginx/key.pem;
        ssl_protocols       SSLv3 TLSv1;
        ssl_ciphers         RC4-SHA:RC4-MD5:DES-CBC3-SHA;

        location / {
            proxy_pass http://nas;
            proxy_set_header Host $host;
        }
    }
}
